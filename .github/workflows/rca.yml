name: Sample RCA test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests and save logs
        run: npm test 2>&1 | tee logs.txt

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: logs.txt

  rca:
    needs: build
    if: failure()
    uses: itsmeteja9/Agent-POC/.github/workflows/rca-reusable.yml@a8ce829
    with:
      tool_repo: itsmeteja9/Agent-POC
      log_file: logs.txt
      log_artifact_name: build-logs
      artifact_name: rca-report
      python_version: '3.10'
